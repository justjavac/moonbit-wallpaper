name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  native:
    name: native-${{ matrix.flag }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            flag: linux
            coverage_file: coverage-linux.xml
          - os: macos-latest
            flag: macos
            coverage_file: coverage-macos.xml
          - os: windows-latest
            flag: windows
            coverage_file: coverage-windows.xml

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install MoonBit on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          curl -fsSL https://cli.moonbitlang.com/install/unix.sh | bash
          echo "$HOME/.moon/bin" >> "$GITHUB_PATH"

      - name: Install MoonBit on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Set-ExecutionPolicy RemoteSigned -Scope CurrentUser
          irm https://cli.moonbitlang.com/install/powershell.ps1 | iex
          "$HOME\.moon\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Show MoonBit version
        run: moon version

      - name: Check native package
        run: moon check --target native

      - name: Test with coverage
        run: moon test --target native --enable-coverage

      - name: Export Cobertura coverage
        run: moon coverage analyze -p moonbit_native/wallpaper -- -f cobertura -o "${{ matrix.coverage_file }}"

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ${{ matrix.coverage_file }}
          flags: ${{ matrix.flag }}
          name: ${{ matrix.flag }}
          disable_search: true
          token: ${{ secrets.CODECOV_TOKEN }}
